[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "vite"
  port = 8888

# 啟用 Netlify Identity
[template.environment]
  NETLIFY_IDENTITY = "true"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
